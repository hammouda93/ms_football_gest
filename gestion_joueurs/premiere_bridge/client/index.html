<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MS Premiere Bridge</title>
  <script src="CSInterface.js"></script>
  <script defer src="index.js"></script>
<style>
  :root {
    --bg: #111827;
    --panel: #1f2937;
    --panel-2: #243041;
    --panel-3: #0f172a;
    --text: #f8fafc;
    --muted: #94a3b8;
    --border: #334155;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --accent: #7c3aed;
    --accent-hover: #6d28d9;
    --success: #0f766e;
    --success-hover: #129287;
    --warning: #b45309;
    --warning-hover: #d97706;
    --shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    --radius: 10px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
    color: var(--text);
    padding: 10px;
  }

  .app {
    max-width: 1480px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    padding: 10px 14px;
    background: rgba(31, 41, 55, 0.96);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .header h1 {
    margin: 0;
    font-size: 18px;
    line-height: 1;
  }

  .badge {
    padding: 6px 10px;
    border-radius: 999px;
    background: #0b1220;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    line-height: 1;
  }

  .layout {
    display: grid;
    grid-template-columns: 1.55fr 0.8fr;
    gap: 10px;
    align-items: start;
  }

  .left,
  .right {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: rgba(31, 41, 55, 0.96);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-header {
    padding: 8px 11px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
    font-size: 12px;
    font-weight: bold;
    line-height: 1.1;
  }

  .card-body {
    padding: 10px;
  }

  button {
    border: 0;
    border-radius: 9px;
    color: #fff;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    min-height: 48px;
    padding: 12px 14px;
    transition: 0.14s ease;
    line-height: 1.15;
  }

  button:hover {
    transform: translateY(-1px);
    opacity: 0.97;
  }

  .btn-primary { background: var(--primary); }
  .btn-primary:hover { background: var(--primary-hover); }

  .btn-accent { background: var(--accent); }
  .btn-accent:hover { background: var(--accent-hover); }

  .btn-success { background: var(--success); }
  .btn-success:hover { background: var(--success-hover); }

  .btn-warning { background: var(--warning); }
  .btn-warning:hover { background: var(--warning-hover); }

  .btn-muted { background: #475569; }

  .categories-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .cat-btn {
    text-align: left;
    background: #273449;
    border: 1px solid #3a4a63;
    padding: 12px 14px;
    min-height: 50px;
  }

  .cat-code {
    display: inline-block;
    width: 20px;
    margin-right: 6px;
    color: #fbbf24;
    font-weight: 700;
  }

  .pipeline-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px;
  }

  .pipe {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .pipe-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1;
  }

  .pipe-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .top-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .status-box {
    min-height: 390px;
    max-height: 620px;
    overflow-y: auto;
    padding: 10px;
    background: var(--panel-3);
    border: 1px solid var(--border);
    border-radius: 10px;
    white-space: pre-wrap;
    font-size: 11px;
    line-height: 1.35;
    color: #dbeafe;
    overflow-wrap: anywhere;
  }

  @media (max-width: 1180px) {
    .pipeline-row {
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (max-width: 980px) {
    .layout {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 300px) {
    .categories-grid,
    .pipeline-row,
    .top-actions {
      grid-template-columns: 1fr;
    }

    .header {
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
    }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>MS Premiere Bridge</h1>
      <div class="badge">Compact</div>
    </div>

    <div class="layout">
      <div class="left">
        <div class="card">
          <div class="card-header">Tags</div>
          <div class="card-body">
            <div class="categories-grid">
              <button class="cat-btn" data-code="0" data-label="CLOSEUP"><span class="cat-code">0</span>Closeup</button>
              <button class="cat-btn" data-code="1" data-label="GOAL"><span class="cat-code">1</span>Goal</button>
              <button class="cat-btn" data-code="2" data-label="ASSIST"><span class="cat-code">2</span>Assist</button>
              <button class="cat-btn" data-code="3" data-label="KEYPASS"><span class="cat-code">3</span>KeyPass</button>
              <button class="cat-btn" data-code="4" data-label="BESTACTION"><span class="cat-code">4</span>BestAction</button>
              <button class="cat-btn" data-code="5" data-label="DRIBBLE"><span class="cat-code">5</span>Dribble</button>
              <button class="cat-btn" data-code="6" data-label="CHALLENGE"><span class="cat-code">6</span>Challenge</button>
              <button class="cat-btn" data-code="7" data-label="GREATPASS"><span class="cat-code">7</span>GreatPass</button>
              <button class="cat-btn" data-code="8" data-label="HEADER"><span class="cat-code">8</span>Header</button>
              <button class="cat-btn" data-code="9" data-label="OTHER"><span class="cat-code">9</span>Other</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">Pipeline</div>
          <div class="card-body">
            <div class="pipeline-row">
              <div class="pipe">
                <div class="pipe-title"data-code="1">Styles</div>
                <div class="pipe-actions">
                  <button id="mark-slowmo" class="btn-warning">SlowMo</button>
                  <button id="mark-reverse" class="btn-warning">Reverse</button>
                </div>
                <div class="pipe-actions" data-code="2">
                  <button id="build-styled" class="btn-accent">2- Appliquer</button>
                </div>
              </div>
              <div class="pipe">
                <div class="pipe-title">Process</div>
                <div class="pipe-actions">
                  <button id="build-final" class="btn-primary" data-code="1"> 1- Trier </button>
                  <div class="pipe-actions">
                    <button id="build-completed" class="btn-success" data-code="3">3- Intro/Audio</button>
                  </div>
                  <div class="pipe-actions">
                    <button id="build-styled" class="btn-accent" data-code="4">4- Livrer</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="card">
          <div class="card-header">Controls</div>
          <div class="card-body">
            <div class="top-actions">
              <button id="run-now" class="btn-primary">Run</button>
              <button id="refresh-summary" class="btn-muted">Refresh</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">Status</div>
          <div class="card-body">
            <div class="status-box" id="status">Waiting...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
