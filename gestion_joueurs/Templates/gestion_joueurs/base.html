{% load static %}
<!-- {% load crispy_forms_tags %} -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script>
        $(document).ready(function() {
            $('#id_deadline').datepicker({
                format: 'yyyy-mm-dd', // Format de la date
                autoclose: true,
            });
        });
    </script>
    <script>
        function toggleForms() {
            const newPlayerForm = document.getElementById('new-player-form');
            const existingPlayerForm = document.getElementById('existing-player-form');
            const videoForm = document.getElementById('video-form');
            if (document.getElementById('add-new-player').checked) {
                newPlayerForm.style.display = 'block';
                existingPlayerForm.style.display = 'none';
                videoForm.style.display = 'none'; // Masquer le formulaire vidéo au début
            } else {
                newPlayerForm.style.display = 'none';
                existingPlayerForm.style.display = 'block';
                videoForm.style.display = 'none'; // Masquer le formulaire vidéo au début
            }
        }
    </script>
    
    <title>{% block title %}Votre Titre{% endblock %}</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="{% url 'dashboard' %}">Votre Logo</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mr-auto">
                <!-- Autres liens de navigation -->
            </ul>
            <div class="form-inline my-2 my-lg-0">
                {% if user.is_authenticated %}
                    <a href="{% url 'register_video_editor' %}" class="btn btn-outline-success my-2 my-sm-0">
                        <i class="fas fa-user-plus"></i> Ajouter Éditeur Vidéo
                    </a>
                    <a href="{% url 'user_logout' %}" class="btn btn-outline-danger my-2 my-sm-0">Déconnexion</a>
                {% else %}
                    <a href="{% url 'user_login' %}" class="btn btn-outline-primary my-2 my-sm-0">Connexion</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
